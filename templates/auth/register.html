{% extends 'base.html' %}

{% block title %}Register Account - InterviewAce AI{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 2.5rem auto;">
    <div class="glass-card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div class="brand-icon" style="margin: 0 auto 1rem auto; width: 50px; height: 50px; font-size: 1.5rem;">⚡</div>
            <h2 style="font-size: 1.8rem;">Create Candidate Account</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Get instant access to AI mock interviews & resume coaching</p>
        </div>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="form-group">
                <label class="form-label" for="username">Full Name / Username</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="alex_dev" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="alex@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="At least 6 characters" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="Re-enter password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.85rem;">
                Create Free Account
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.75rem; padding-top: 1.25rem; border-top: 1px solid var(--glass-border); font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? 
            <a href="{{ url_for('login') }}" style="font-weight: 600; color: var(--primary);">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
